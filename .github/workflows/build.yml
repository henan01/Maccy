name: Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Resolve packages
        run: |
          mkdir -p build/logs
          xcodebuild \
            -resolvePackageDependencies \
            -project Maccy.xcodeproj \
            -scheme Maccy \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/logs/resolve-packages.log

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project Maccy.xcodeproj \
            -scheme Maccy \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            2>&1 | tee build/logs/xcodebuild.log

      - name: Print build errors
        if: failure()
        run: |
          if [ -f build/logs/xcodebuild.log ]; then
            grep -n -i -C 8 "error:" build/logs/xcodebuild.log || true
            grep -n -i -C 8 "failed" build/logs/xcodebuild.log || true
          fi

      - name: Inspect app
        run: |
          test -d build/DerivedData/Build/Products/Release/Maccy.app
          du -sh build/DerivedData/Build/Products/Release/Maccy.app

      - name: Archive app
        run: |
          ditto \
            -c \
            -k \
            --keepParent \
            build/DerivedData/Build/Products/Release/Maccy.app \
            build/Maccy.app.zip

      - name: Create DMG
        run: |
          mkdir -p build/dmg-root
          ditto build/DerivedData/Build/Products/Release/Maccy.app build/dmg-root/Maccy.app
          hdiutil create \
            -volname Maccy \
            -srcfolder build/dmg-root \
            -ov \
            -format UDZO \
            build/Maccy.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: Maccy-dmg
          path: build/Maccy.dmg

      - name: Upload app
        uses: actions/upload-artifact@v7
        with:
          name: Maccy-app
          path: build/Maccy.app.zip

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs
          path: build/logs
          if-no-files-found: ignore
